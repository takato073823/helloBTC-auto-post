name: helloBTC 自動記事投稿

on:
  schedule:
    # 1日6回投稿 — サラリーマンの閲覧ピーク時間帯 (日本時間)
    - cron: "0 22 * * *"  # JST 07:00 朝の通勤
    - cron: "0 3 * * *"   # JST 12:00 昼休み
    - cron: "0 6 * * *"   # JST 15:00 午後の休憩
    - cron: "0 9 * * *"   # JST 18:00 退社・帰宅ラッシュ
    - cron: "0 11 * * *"  # JST 20:00 帰宅後のリラックスタイム
    - cron: "0 13 * * *"  # JST 22:00 就寝前のニュースチェック
  workflow_dispatch:  # 手動実行ボタン

jobs:
  post-article:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # posted_urls.json をコミットするために必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存パッケージをインストール
        run: pip install --timeout 120 -r requirements.txt

      - name: 記事を自動投稿
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        working-directory: scripts
        run: python main.py

      - name: 投稿済み URL リストをコミット
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add scripts/posted_urls.json
          git diff --staged --quiet || git commit -m "chore: update posted URLs [skip ci]"
          git push
